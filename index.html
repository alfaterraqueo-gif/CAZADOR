<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAZADOR</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            text-align: center;
            padding: 50px 20px;
        }
        h1 {
            font-size: 4.5rem;
            margin: 0;
            background: linear-gradient(90deg, #ff00cc, #3333ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.4rem;
            max-width: 700px;
            margin: 20px auto;
            opacity: 0.9;
        }
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.3rem;
            background: #ff00cc;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: scale(1.1);
            background: #ff33dd;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CAZADOR</h1>
        <p>La web más poderosa que has visto hoy.<br>¿Estás listo para cazar?</p>
        <a href="#" class="btn">ENTRAR AL CAZADOR</a>
    </div>
</body>
</html>
