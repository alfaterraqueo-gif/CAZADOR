<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAZADOR – Archivo Científico Vivo</title>

    <style>
        :root { --neon-pink: #ff00ff; --neon-blue: #00ffff; --dark: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif; 
            background: var(--dark); 
            color: white; 
            scroll-behavior: smooth;
            line-height: 1.6;
        }

        nav { 
            position: fixed; 
            top: 10px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(10,10,10,0.95); 
            border: 2px solid var(--neon-pink); 
            border-radius: 50px; 
            padding: 10px 20px; 
            z-index: 1000; 
            backdrop-filter: blur(10px);
        }
        nav a { color: white; margin: 0 12px; text-decoration: none; font-weight: bold; }

        header { 
            min-height: 100vh; 
            background: linear-gradient(135deg, #1a0033, #000000); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            padding: 100px 20px 60px;
        }

        .logo { max-width: 680px; width: 90%; margin-bottom: 30px; filter: drop-shadow(0 0 60px rgba(255,0,255,0.8)); }
        .subtitle { font-size: 2.1rem; font-weight: 800; letter-spacing: 2px; background: linear-gradient(90deg, #ff00ff, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .section { 
            padding: 100px 5% 80px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .section h2 { 
            font-size: 3.2rem; 
            text-align: center; 
            margin-bottom: 50px; 
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-blue)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); 
            gap: 25px; 
        }

        .video-card {
            height: 620px;
            background-size: cover;
            background-position: center;
            border: 2px solid #333;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }
        .overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            padding: 40px 20px 30px;
            text-align: center;
        }
        .btn {
            margin-top: 15px;
            padding: 14px 35px;
            background: var(--neon-pink);
            color: black;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#archivo">🧬 ARCHIVO</a>
        <a href="#adn">🧬 A.D.N.</a>
        <a href="#videos">📹 VIDEOS</a>
        <a href="#cientificos">🧠 CIENTÍFICOS</a>
    </nav>

    <header>
        <img src="LOGO.png" alt="CAZADOR" class="logo">
        <p class="subtitle">Plataforma científica que rastrea, preserva y revela<br>el conocimiento que el mundo ignora</p>
    </header>

    <!-- Aquí pones el resto de tu contenido (sección archivo, videos, etc.) -->

    <div class="section" id="archivo">
        <h2>🧬 ARCHIVO</h2>
        <!-- tu contenido del archivo -->
    </div>

    <div class="section" id="videos">
        <h2>📹 VIDEOS</h2>
        <!-- tus tarjetas de videos -->
    </div>

</body>
</html>
