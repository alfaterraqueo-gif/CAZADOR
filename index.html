<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAZADOR – Archivo Científico Vivo</title>
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --dark: #0a0a0a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: var(--dark);
            color: white;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,10,10,0.95);
            border: 2px solid var(--neon-pink);
            border-radius: 50px;
            padding: 12px 25px;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        nav a { 
            color: white; 
            margin: 0 18px; 
            text-decoration: none; 
            font-weight: bold; 
            transition: 0.3s; 
        }
        nav a:hover { color: var(--neon-pink); }

        header {
            height: 100vh;
            background: linear-gradient(135deg, #1a0033, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .logo {
            max-width: 720px;
            width: 100%;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 50px rgba(255, 0, 255, 0.7));
        }
        .subtitle {
            font-size: 2.3rem;
            margin-top: 15px;
            color: #ff00ff;
            text-shadow: 0 0 25px var(--neon-pink);
        }
    </style>
</head>
<body>

    <nav>
        <a href="#archivo">🧬 ARCHIVO</a>
        <a href="#adn">🧬 ADN</a>
        <a href="#videos">📹 VIDEOS</a>
        <a href="#cientificos">🧠 CIENTÍFICOS</a>
    </nav>

    <header>
        <img src="LOGO.png" alt="Logo CAZADOR" class="logo">
        <p class="subtitle">Ciencia en Defensa de la Vida</p>
    </header>

    <footer style="text-align:center; padding:80px; background:#000;">
        <p>CAZADOR – Archivo Científico Vivo © 2026</p>
    </footer>
</body>
</html>
