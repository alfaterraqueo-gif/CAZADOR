<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAZADOR – Archivo Científico Vivo</title>
    <style>
        :root { --neon-pink: #ff00ff; --neon-blue: #00ffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif; 
            background: #0a001f; 
            color: white; 
            scroll-behavior: smooth; 
        }

        nav { 
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%); 
            background: rgba(10,10,10,0.95); border: 2px solid var(--neon-pink); 
            border-radius: 50px; padding: 12px 20px; z-index: 1000; 
        }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }

        header { 
            min-height: 100vh; 
            background: linear-gradient(rgba(10,0,31,0.85), rgba(0,20,60,0.85)), 
                        url('https://images.unsplash.com/photo-1507413245164-6160d8298b31?ixlib=rb-4.0.3&auto=format&fit=crop&q=80') center/cover no-repeat;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; 
        }

        .logo { max-width: 720px; width: 90%; margin-bottom: 30px; filter: drop-shadow(0 0 60px rgba(255,0,255,0.8)); }
        .subtitle { font-size: 2.2rem; font-weight: 800; letter-spacing: 2px; background: linear-gradient(90deg, #ff00ff, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .section { 
            padding: 120px 5% 80px; 
            max-width: 1200px; 
            margin: 40px auto; 
            background: linear-gradient(135deg, rgba(10, 5, 40, 0.95), rgba(0, 20, 60, 0.95)); 
            border: 1px solid rgba(0, 255, 255, 0.3); 
            border-radius: 20px; 
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.15);
        }

        .section h2 { 
            font-size: 3.5rem; text-align: center; margin-bottom: 60px; 
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-blue)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 25px; }

        .pdf-card, .video-card {
            background: rgba(15, 8, 50, 0.98);
            border: 1px solid rgba(0, 255, 255, 0.4);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: all 0.4s;
        }
        .video-card {
            height: 520px;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }
        .overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            padding: 40px 20px 30px;
        }
        .btn {
            margin-top: 15px;
            padding: 14px 35px;
            background: var(--neon-pink);
            color: black;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#archivo">🧬 ARCHIVO</a>
        <a href="#adn">🧬 A.D.N.</a>
        <a href="#videos">📹 VIDEOS</a>
        <a href="#radio">📻 RADIO</a>
        <a href="#cientificos">🧠 CIENTÍFICOS</a>
    </nav>

    <header>
        <img src="LOGO.png" alt="CAZADOR" class="logo">
        <p class="subtitle">Plataforma científica que rastrea, preserva y revela<br>el conocimiento que el mundo ignora</p>
    </header>

    <!-- Aquí pega tus secciones ARCHIVO, VIDEOS, RADIO, etc. -->

    <footer style="text-align:center; padding:80px; background:#000;">
        <p>CAZADOR – Archivo Científico Vivo © 2026</p>
    </footer>
</body>
</html>
